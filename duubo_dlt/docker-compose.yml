version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.1.0
    container_name: nacos-server
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=
      - NACOS_AUTH_ENABLE=false
    ports:
      - "8848:8848"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    networks:
      - dubbo-network
    restart: unless-stopped

  # Dubbo Agent 服务 - 自定义配置版
  dubbo-agent:
    build:
      context: .
      dockerfile: ./dubbo-agent/Dockerfile
    container_name: dubbo-agent
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=dubbo-agent
      - NACOS_HOST=nacos-server
      - AGENT_LOADBALANCE=random
      - AGENT_DURATION_SECONDS=100
      - AGENT_TEST_MODE=FIXED_COUNT
      - AGENT_REQUEST_COUNT=100
      - AGENT_SERIALIZATION=hessian2
      - TEST_DEFAULT_TIMEOUT_SECONDS=300
      - TEST_MAX_CONCURRENT_TESTS=10
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC -Dfile.encoding=UTF-8
    ports:
      - "8080:8080"
    volumes:
      - ./logs/agent:/app/logs
    depends_on:
      nacos:
        condition: service_started
    networks:
      - dubbo-network
    restart: unless-stopped

  # Dubbo Produce 服务 1
  dubbo-producer-1:
    build:
      context: .
      dockerfile: ./dubbo-producer/Dockerfile
    container_name: dubbo-producer-1
    environment:
      - SERVICE_PORT=8082
      - SPRING_APPLICATION_NAME=dubbo-producer-1
      - NACOS_HOST=nacos-server
      - AGENT_HOST=dubbo-agent
      - AGENT_PORT=8080
      - DUBBO_PROTOCOL_PORT=20880
      - DUBBO_REGISTER_MODE=instance
      - DUBBO_PROTOCOL_NAME=dubbo
      - DUBBO_LOADBALANCE=leastactive
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC -Dfile.encoding=UTF-8
    ports:
      - "8082:8082"
      - "20880:20880"
    volumes:
      - ./logs/producer-1:/app/logs
      - dubbo-cache:/root/.dubbo
    depends_on:
      nacos:
        condition: service_started
    networks:
      - dubbo-network
    restart: unless-stopped

  # Dubbo producer 服务 2
  dubbo-producer-2:
